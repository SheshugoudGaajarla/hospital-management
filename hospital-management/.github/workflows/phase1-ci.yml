name: phase1-ci

on:
  push:
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy app
      - name: Run tests
        run: uv run pytest -q

  web-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
